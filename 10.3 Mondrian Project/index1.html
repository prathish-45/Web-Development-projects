<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta lang="en">
    <style>
      /* Write your code */
      /* 
      Gap Colour: #000
      White: #F0F1EC
       Red: #E72F24
      Black: #232629
      Blue: #004592
      Yellow: #F9D01E */
      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .container {
        height: 800px;
        width: 800px;
        background-color: #000;
        display: grid;
        grid-template-columns: 1fr 2fr 0.25fr;
        grid-template-rows: 1fr 1fr 0.5fr 0.5fr;
        gap: 15px;
      }
      .white1 {
        background-color: #F0F1EC;
      }
      .red {
        background-color: #E72F24;
        grid-column: span 2;
        grid-row: span 2;
      }
      .white2 {
        background-color: #F0F1EC;
      }
      .blue {
        background-color: #004592;
        grid-row: span 2;
      }
      .white3 {
        background-color: #F0F1EC;
        grid-row: span 2;
      }
      .white4 {
        background-color: #F0F1EC;
      }
      .yellow {
        background-color: #F9D01E;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="item white1"></div>
      <div class="item red"></div>
      <div class="item white2"></div>
      <div class="item blue"></div>
      <div class="item white3"></div>
      <div class="item white4"></div>
      <div class="item yellow"></div>
    </div>
  </body>  
</html>
